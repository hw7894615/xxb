<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业信息设置 - 蚂蚁链存证系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-floating > label {
            color: #6c757d;
        }
        .info-note {
            background-color: #d1ecf1;
            border-left: 4px solid #17a2b8;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 0.375rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1 class="display-5">
                <a href="{{ url_for('index') }}" class="text-white text-decoration-none">
                    <i class="bi bi-arrow-left"></i> 蚂蚁链存证系统
                </a>
            </h1>
            <p class="lead">企业信息设置</p>
            <div class="mt-2">
                <a href="{{ url_for('config') }}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-gear"></i> 网关配置
                </a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5><i class="bi bi-building"></i> 企业基本信息</h5>
                    </div>
                    <div class="card-body">
                        {% if enterprise %}
                            <div class="alert alert-info mb-3">
                                <i class="bi bi-info-circle"></i> 已存在企业信息，将更新现有信息
                            </div>
                        {% else %}
                            <div class="alert alert-info mb-3">
                                <i class="bi bi-info-circle"></i> 首次设置企业信息，填写后可重复使用
                            </div>
                        {% endif %}

                        <form method="POST" id="enterpriseForm">
                            <div class="mb-3">
                                <label for="company_name" class="form-label">企业名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="company_name" name="company_name" required
                                    value="{{ enterprise.company_name if enterprise else '' }}"
                                    placeholder="请输入企业全称">
                            </div>

                            <div class="mb-3">
                                <label for="legal_person" class="form-label">法定代表人 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="legal_person" name="legal_person" required
                                    value="{{ enterprise.legal_person if enterprise else '' }}"
                                    placeholder="请输入法定代表人姓名">
                            </div>

                            <div class="mb-3">
                                <label for="legal_person_id" class="form-label">法定代表人身份证号 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="legal_person_id" name="legal_person_id" required
                                    value="{{ enterprise.legal_person_id if enterprise else '' }}"
                                    placeholder="请输入18位身份证号码">
                            </div>

                            <div class="mb-3">
                                <label for="company_id" class="form-label">营业执照注册号 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="company_id" name="company_id" required
                                    value="{{ enterprise.company_id if enterprise else '' }}"
                                    placeholder="请输入营业执照统一社会信用代码">
                            </div>

                            <div class="mb-3">
                                <label for="mobile_no" class="form-label">联系电话</label>
                                <input type="text" class="form-control" id="mobile_no" name="mobile_no"
                                    value="{{ enterprise.mobile_no if enterprise else '' }}"
                                    placeholder="请输入联系电话">
                            </div>

                            <div class="mb-3">
                                <label for="address" class="form-label">企业地址</label>
                                <textarea class="form-control" id="address" name="address" rows="3"
                                    placeholder="请输入企业注册地址">{{ enterprise.address if enterprise else '' }}</textarea>
                            </div>

                            <div class="info-note">
                                <h6><i class="bi bi-shield-lock"></i> 信息保密说明</h6>
                                <p>企业信息仅用于存证时的身份验证，不会泄露给第三方。填写后可在后续存证操作中直接使用，无需重复录入。</p>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                                    <i class="bi bi-save"></i> 保存企业信息
                                </button>
                                {% if enterprise %}
                                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                                        <i class="bi bi-skip-forward"></i> 跳过设置，直接存证
                                    </a>
                                {% endif %}
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 蚂蚁链存证系统. 基于蚂蚁链技术构建.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 表单提交前验证
        document.getElementById('enterpriseForm').addEventListener('submit', function(e) {
            const companyName = document.getElementById('company_name').value.trim();
            const legalPerson = document.getElementById('legal_person').value.trim();
            const legalPersonId = document.getElementById('legal_person_id').value.trim();
            const companyId = document.getElementById('company_id').value.trim();

            if (!companyName || !legalPerson || !legalPersonId || !companyId) {
                alert('请填写所有必填字段');
                e.preventDefault();
                return false;
            }

            // 身份证号码格式验证
            const idCardRegex = /^\d{17}([0-9]|X)$/i;
            if (!idCardRegex.test(legalPersonId)) {
                alert('请输入有效的18位身份证号码');
                document.getElementById('legal_person_id').focus();
                e.preventDefault();
                return false;
            }

            // 统一社会信用代码验证（简单格式验证）
            const companyIdRegex = /^[0-9A-HJ-NPQRTUWXY]{2}\d{6}[0-9A-HJ-NPQRTUWXY]{10}$/;
            if (!companyIdRegex.test(companyId) && companyId.length !== 15) {
                alert('请输入有效的统一社会信用代码');
                document.getElementById('company_id').focus();
                e.preventDefault();
                return false;
            }

            // 确认提交
            if (confirm('确认要保存企业信息吗？信息将用于存证时的身份验证。')) {
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> 保存中...';
                submitBtn.disabled = true;
                return true;
            } else {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
